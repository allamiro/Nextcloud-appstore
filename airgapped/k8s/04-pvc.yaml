# =============================================================================
# Persistent Volume Claims - Air-Gapped Deployment
# Set storageClassName to match your cluster's available StorageClass.
# Leave commented to use the cluster default.
# =============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: nextcloud-appstore
  labels:
    app.kubernetes.io/name: nextcloud-appstore
    app.kubernetes.io/component: database
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  # storageClassName: standard

